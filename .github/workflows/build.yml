name: Build the shaweelAddons .jar file
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          
      - name: Fetch information from gradle.properties
        run: |
          echo "MOD_VERSION=$(grep '^mod_version' gradle.properties | cut -d'=' -f2 | tr -d ' ')" >> $GITHUB_ENV
          echo "MINECRAFT_VERSION=$(grep '^minecraft_version' gradle.properties | cut -d'=' -f2 | tr -d ' ')" >> $GITHUB_ENV
          
      - name: Build the shaweelAddons .jar file
        run: | 
          chmod +x ./gradlew
          ./gradlew build
          mv build/libs/shaweeladdons-${{ env.MOD_VERSION }}.jar build/libs/shaweeladdons-mc${{ env.MINECRAFT_VERSION }}-v${{ env.MOD_VERSION }}+b${{ github.run_number }}.jar

      - name: Upload the shaweelAddons .jar file
        uses: actions/upload-artifact@v7
        with:
          path: build/libs/shaweeladdons-mc${{ env.MINECRAFT_VERSION }}-v${{ env.MOD_VERSION }}+b${{ github.run_number }}.jar
          archive: false
